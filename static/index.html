<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whisper Transcription</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <main class="container">
      <header class="hero">
        <h1>Whisper</h1>
      </header>

      <section class="panel recorder-panel">
        <div class="upload-corner">
          <label class="upload-btn" for="audio-file-input">Subir</label>
          <input id="audio-file-input" type="file" accept="audio/*" />
        </div>

        <div class="recorder-wrap">
          <button id="record-btn" type="button" class="record-btn" aria-label="Iniciar grabacion">
            <span id="record-icon" class="record-icon">●</span>
          </button>
          <div class="recorder-text">
            <p id="record-status" class="status">Listo para grabar</p>
            <p id="upload-file-name" class="hint">o sube un archivo para transcribir al instante</p>
          </div>
          <span id="loading" class="loading hidden">Transcribiendo...</span>
        </div>
      </section>

      <section class="panel result-panel">
        <div class="result-head">
          <h2>Resultado</h2>
          <button id="copy-btn" type="button" class="copy-btn" disabled>Copiar</button>
        </div>
        <p id="result-empty" class="hint">La transcripcion aparecera aqui.</p>
        <pre id="result-text" class="hidden"></pre>
        <p id="result-meta" class="hint hidden"></p>
        <p id="result-error" class="error hidden"></p>
      </section>
    </main>

    <script src="/static/app.js?v=20260311-1" type="module"></script>
  </body>
</html>
